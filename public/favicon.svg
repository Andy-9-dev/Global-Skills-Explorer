<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#13c8ec" opacity="0.1"/>
  
  <!-- Globe/World icon -->
  <g transform="translate(50, 50)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#13c8ec" stroke-width="2"/>
    
    <!-- Latitude lines -->
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#13c8ec" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="35" ry="24" fill="none" stroke="#13c8ec" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Longitude lines -->
    <path d="M -35 0 Q -25 -20 0 -35 Q 25 -20 35 0 Q 25 20 0 35 Q -25 20 -35 0" fill="none" stroke="#13c8ec" stroke-width="1.5" opacity="0.6"/>
    <path d="M 0 -35 L 0 35" stroke="#13c8ec" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Accent dots for job locations -->
    <circle cx="15" cy="-20" r="2.5" fill="#13c8ec"/>
    <circle cx="-18" cy="15" r="2.5" fill="#13c8ec"/>
    <circle cx="20" cy="18" r="2.5" fill="#13c8ec"/>
    <circle cx="-12" cy="-18" r="2" fill="#13c8ec" opacity="0.7"/>
    <circle cx="8" cy="25" r="2" fill="#13c8ec" opacity="0.7"/>
  </g>
</svg>
